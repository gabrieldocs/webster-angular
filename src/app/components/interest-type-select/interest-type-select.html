<select 
    class="border-2 border-black rounded-lg px-2 py-1 mr-2 bg-white text-black font-bold" 
    [ngModel]="value"
    (ngModelChange)="valueChange.emit($event)">
    @if(showAll) {
        <option class="bg-white text-black font-bold" value="all">All</option>
    }
    <option class="bg-white text-black font-bold" value="hobby">Hobby</option>
    <option class="bg-white text-black font-bold" value="work">Work</option>
</select>
